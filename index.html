function evaluarCredito(input, policies) {
  const {
    monto_usd,
    plazo_meses,
    ingreso_mensual_usd
  } = input;
  const i = policies.tasa_mensual_pct / 100;
  const n = plazo_meses;
  const factor = Math.pow(1 + i, n);
  const cuota = monto_usd * (i * factor) / (factor - 1);
  const cuota_semanal = cuota / 4.33;
  const motivos = [];
  if (!(monto_usd >= policies.precio_minimo_usd && monto_usd <= policies.precio_maximo_usd)) {
    motivos.push(`El precio debe estar entre $${policies.precio_minimo_usd} y $${policies.precio_maximo_usd}.`);
  }
  if (!policies.plazos_meses.includes(plazo_meses)) {
    motivos.push(`El plazo debe ser uno de: ${policies.plazos_meses.join(", ")} meses.`);
  }
  if (!(ingreso_mensual_usd >= policies.ingreso_minimo_usd)) {
    motivos.push(`El ingreso mensual mínimo referencial es $${policies.ingreso_minimo_usd}.`);
  }
  const ratio = cuota / ingreso_mensual_usd;
  if (ratio > policies.ratio_cuota_ingreso_max) {
    motivos.push(`La cuota representaría ${(ratio * 100).toFixed(0)}% del ingreso, sobre el máximo referencial de ${(policies.ratio_cuota_ingreso_max * 100).toFixed(0)}%.`);
  }
  const cumple = motivos.length === 0;
  return {
    cumple,
    cuota_estimada_mensual: Number.isFinite(cuota) ? Number(cuota.toFixed(2)) : null,
    cuota_estimada_semanal: Number.isFinite(cuota_semanal) ? Number(cuota_semanal.toFixed(2)) : null,
    motivo: cumple ? "Encaja con la política referencial vigente." : motivos.join(" ")
  };
}

/* ============================== CEREBRO (API vía proxy) ============================== */

async function callAnthropic(messages, systemPrompt, apiKey) {
  const body = {
    model: "claude-sonnet-5",
    max_tokens: 500,
    system: systemPrompt,
    tools: [EVALUAR_CREDITO_TOOL],
    messages
  };
  try {
    const r = await fetch(PROXY_URL, {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "apikey": PROXY_KEY,
        "authorization": "Bearer " + PROXY_KEY
      },
      body: JSON.stringify(body)
    });
    if (r.ok) return await r.json();
    if (r.status !== 404) {
      const errData = await r.json().catch(() => ({}));
      throw new Error(errData.error || `Error del servidor (${r.status})`);
    }
  } catch (e) {
    if (!(e instanceof TypeError)) throw e;
  }
  if (!apiKey) throw new Error("No hay conexión con el backend ni una API key en el panel admin.");
  const r2 = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });
  const data = await r2.json();
  if (!r2.ok) throw new Error(data.error?.message || "Error al conectar con Anthropic.");
  return data;
}
async function runBrainTurn(history, systemPrompt, policies, apiKey) {
  let messages = history;
  let response = await callAnthropic(messages, systemPrompt, apiKey);
  let lastEval = null;
  while (response.stop_reason === "tool_use") {
    const toolUse = response.content.find(b => b.type === "tool_use");
    if (!toolUse) break;
    const result = evaluarCredito(toolUse.input, policies);
    lastEval = {
      input: toolUse.input,
      result
    };
    messages = [...messages, {
      role: "assistant",
      content: response.content
    }, {
      role: "user",
      content: [{
        type: "tool_result",
        tool_use_id: toolUse.id,
        content: JSON.stringify(result)
      }]
    }];
    response = await callAnthropic(messages, systemPrompt, apiKey);
  }
  const textBlock = response.content.find(b => b.type === "text");
  const replyText = textBlock ? textBlock.text : "";
  return {
    replyText,
    finalMessages: [...messages, {
      role: "assistant",
      content: replyText
    }],
    lastEval
  };
}
