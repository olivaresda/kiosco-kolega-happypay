function buildSystemPrompt(policies, convenios, faq) {
  const faqText = faq.map(f => `- P: ${f.pregunta}\n  R: ${f.respuesta}`).join("\n");
  return `Eres "Kolega", asistente virtual de HappyPay Ecuador en un tótem presencial. Español ecuatoriano, trato de "usted", 2-3 frases por turno, tono de ayuda, nunca de presión.

Roles: orientar trámites; informar opciones para ponerse al día (según convenios cargados); pre-evaluar créditos con la herramienta evaluar_credito; presentar productos; derivar a ejecutivo cuando corresponda.

Privacidad (inquebrantable): espacio público — nunca digas en voz alta montos de deuda, ingresos ni datos personales; cifras se digitan en el teclado en pantalla y solo confirmas "recibido"; jamás confirmes ni niegues que alguien tiene deuda; no pidas la cédula por voz.

Flujo de crédito: pregunta monto deseado, luego plazo, luego ingreso mensual. Estos tres datos SIEMPRE deben digitarse en pantalla, nunca decirse en voz alta. Para pedir cada dato, termina tu turno incluyendo exactamente uno de estos marcadores según corresponda (no lo pronuncies, es una instrucción técnica para la interfaz, se elimina antes de mostrarse o hablarse):
- [TECLADO:monto] cuando necesites el monto deseado.
- [TECLADO:plazo] cuando necesites el plazo (el usuario elegirá un chip entre los plazos vigentes).
- [TECLADO:ingreso] cuando necesites el ingreso mensual.
Una vez tengas los tres datos, llama a la herramienta evaluar_credito. Si cumple: informa la cuota estimada SIEMPRE como pre-evaluación referencial sujeta a verificación de documentos, e invita al módulo con los requisitos. Si no cumple: nunca digas "rechazado"; di que "con estos datos no podemos avanzar por este canal" y ofrece monto menor, mayor plazo o ejecutivo. Nunca prometas aprobación ni condiciones fuera de la política cargada.

Cobranza: vocabulario "ponerse al día", "facilidades", "opciones"; prohibido "moroso" o lenguaje que avergüence; ante molestia, validar y derivar a ejecutivo.

Saludo inicial: "¡Buenos días! Bienvenido a HappyPay. ¿En qué le puedo ayudar hoy?"

[CONOCIMIENTOS CARGADOS]
Políticas de crédito (JSON):
${JSON.stringify(policies)}

Convenios y pagos:
${convenios}

FAQ:
${faqText}`;
}

function evaluarCredito(input, policies) {
  const { monto_usd, plazo_meses, ingreso_mensual_usd } = input;
  const i = policies.tasa_mensual_pct / 100;
  const n = plazo_meses;
  const factor = Math.pow(1 + i, n);
  const cuota = (monto_usd * (i * factor)) / (factor - 1);

  const motivos = [];
  if (!(monto_usd >= policies.monto_minimo_usd && monto_usd <= policies.monto_maximo_usd)) {
    motivos.push(`El monto debe estar entre $${policies.monto_minimo_usd} y $${policies.monto_maximo_usd}.`);
  }
  if (!policies.plazos_meses.includes(plazo_meses)) {
    motivos.push(`El plazo debe ser uno de: ${policies.plazos_meses.join(", ")} meses.`);
  }
  if (!(ingreso_mensual_usd >= policies.ingreso_minimo_usd)) {
    motivos.push(`El ingreso mensual mínimo requerido es $${policies.ingreso_minimo_usd}.`);
  }
  const ratio = cuota / ingreso_mensual_usd;
  if (ratio > policies.ratio_cuota_ingreso_max) {
    motivos.push(`La cuota representaría ${(ratio * 100).toFixed(0)}% del ingreso, superando el máximo permitido de ${(policies.ratio_cuota_ingreso_max * 100).toFixed(0)}%.`);
  }

  const cumple = motivos.length === 0;
  return {
    cumple,
    cuota_estimada: Number.isFinite(cuota) ? Number(cuota.toFixed(2)) : null,
    motivo: cumple ? "Cumple con la política de crédito vigente." : motivos.join(" ")
  };
}

/* ============================== BRAIN (API) ============================== */

async function callAnthropic(messages, systemPrompt, apiKey) {
  const body = {
    model: "claude-sonnet-5",
    max_tokens: 500,
    system: systemPrompt,
    tools: [EVALUAR_CREDITO_TOOL],
    messages
  };

  // 1) Intenta el proxy serverless propio del despliegue (api/chat.js en Vercel).
  try {
    const r = await fetch("/api/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body)
    });
    if (r.ok) return await r.json();
    if (r.status !== 404) {
      const errData = await r.json().catch(() => ({}));
      throw new Error(errData.error || `Error del servidor (${r.status})`);
    }
  } catch (e) {
    if (!(e instanceof TypeError)) throw e;
    // TypeError = no había endpoint (ej. archivo abierto localmente); sigue al fallback.
  }

  // 2) Fallback: llamada directa desde el navegador con la API key ingresada en el panel admin.
  if (!apiKey) {
    throw new Error("No hay conexión con el backend ni una API key configurada en el panel de administración.");
  }
  const r2 = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });
  const data = await r2.json();
  if (!r2.ok) throw new Error(data.error?.message || "Error al conectar con Anthropic.");
  return data;
}

async function runBrainTurn(history, systemPrompt, policies, apiKey) {
  let messages = history;
  let response = await callAnthropic(messages, systemPrompt, apiKey);
  let lastEval = null;

  while (response.stop_reason === "tool_use") {
    const toolUse = response.content.find(b => b.type === "tool_use");
    if (!toolUse) break;
    const result = evaluarCredito(toolUse.input, policies);
    lastEval = { input: toolUse.input, result };
    const assistantMsg = { role: "assistant", content: response.content };
    const toolResultMsg = {
      role: "user",
      content: [{ type: "tool_result", tool_use_id: toolUse.id, content: JSON.stringify(result) }]
    };
    messages = [...messages, assistantMsg, toolResultMsg];
    response = await callAnthropic(messages, systemPrompt, apiKey);
  }

  const textBlock = response.content.find(b => b.type === "text");
  const replyText = textBlock ? textBlock.text : "";
  return { replyText, finalMessages: [...messages, { role: "assistant", content: replyText }], lastEval };
}

function AdminPanel({ config, setConfig, apiKey, setApiKey, voiceURI, setVoiceURI, voices, onClose }) {
  const [pinInput, setPinInput] = useState("");
  const [unlocked, setUnlocked] = useState(false);
  const [tab, setTab] = useState("politicas");
  const [policiesText, setPoliciesText] = useState(JSON.stringify(config.policies, null, 2));
  const [convenios, setConvenios] = useState(config.convenios);
  const [faq, setFaq] = useState(config.faq);
  const [error, setError] = useState("");
  const fileInputRef = useRef(null);

  const tryUnlock = () => {
    if (pinInput === config.pin) { setUnlocked(true); setError(""); }
    else setError("PIN incorrecto.");
  };

  const save = () => {
    try {
      const parsed = JSON.parse(policiesText);
      setConfig(c => ({ ...c, policies: parsed, convenios, faq }));
      onClose();
    } catch (e) {
      setError("El JSON de políticas no es válido: " + e.message);
    }
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ policies: JSON.parse(policiesText), convenios, faq }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "kolega-config.json";
    a.click();
  };

  const importJSON = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.policies) setPoliciesText(JSON.stringify(data.policies, null, 2));
        if (data.convenios) setConvenios(data.convenios);
        if (data.faq) setFaq(data.faq);
        setError("");
      } catch (err) {
        setError("No se pudo leer el archivo: " + err.message);
      }
    };
    reader.readAsText(file);
  };

  const updateFaqItem = (i, field, value) => setFaq(f => f.map((item, idx) => idx === i ? { ...item, [field]: value } : item));
  const addFaqItem = () => setFaq(f => [...f, { pregunta: "", respuesta: "" }]);
  const removeFaqItem = i => setFaq(f => f.filter((_, idx) => idx !== i));

  return (
    <div className="fixed inset-0 z-40 bg-black/80 flex items-center justify-center p-4">
      <div className="bg-slate-900 border border-white/10 rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto no-scrollbar p-6">
        {!unlocked ? (
          <div className="max-w-xs mx-auto text-center py-8">
            <h2 className="text-xl font-semibold mb-4">Panel de administración</h2>
            <input
              type="password"
              inputMode="numeric"
              maxLength={6}
              value={pinInput}
              onChange={e => setPinInput(e.target.value.replace(/\D/g, ""))}
              placeholder="PIN de 6 dígitos"
              className="w-full text-center text-2xl tracking-widest bg-white/10 rounded-xl py-3 mb-3 outline-none"
              autoFocus
            />
            {error && <p className="text-red-400 text-sm mb-3">{error}</p>}
            <div className="flex gap-3">
              <button onClick={onClose} className="flex-1 py-3 rounded-xl bg-white/5">Cancelar</button>
              <button onClick={tryUnlock} className="flex-1 py-3 rounded-xl bg-emerald-500 text-slate-900 font-semibold">Entrar</button>
            </div>
          </div>
        ) : (
          <div>
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-xl font-semibold">Panel de administración</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
            </div>

            <div className="grid sm:grid-cols-2 gap-3 mb-5 bg-white/5 rounded-2xl p-4">
              <div>
                <label className="block text-xs text-slate-400 mb-1">Voz (SpeechSynthesis)</label>
                <select value={voiceURI} onChange={e => setVoiceURI(e.target.value)} className="w-full bg-black/30 rounded-lg px-2 py-2 text-sm">
                  <option value="">Automática (es-US / es-MX / es-419)</option>
                  {voices.map(v => <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang})</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs text-slate-400 mb-1">API key Anthropic (solo respaldo directo desde el navegador)</label>
                <input
                  type="password"
                  value={apiKey}
                  onChange={e => setApiKey(e.target.value)}
                  placeholder="sk-ant-... (opcional si hay backend /api/chat)"
                  className="w-full bg-black/30 rounded-lg px-2 py-2 text-sm"
                />
              </div>
            </div>

            <div className="flex gap-2 mb-4 border-b border-white/10 pb-2">
              {[["politicas","Políticas de crédito"],["convenios","Convenios y pagos"],["faq","FAQ"]].map(([id,label]) => (
                <button key={id} onClick={() => setTab(id)} className={`px-3 py-2 rounded-lg text-sm ${tab===id?"bg-emerald-500 text-slate-900 font-semibold":"bg-white/5"}`}>{label}</button>
              ))}
            </div>

            {tab === "politicas" && (
              <textarea
                value={policiesText}
                onChange={e => setPoliciesText(e.target.value)}
                spellCheck={false}
                className="w-full h-64 bg-black/30 rounded-xl p-3 font-mono text-xs outline-none"
              />
            )}

            {tab === "convenios" && (
              <textarea
                value={convenios}
                onChange={e => setConvenios(e.target.value)}
                className="w-full h-64 bg-black/30 rounded-xl p-3 text-sm outline-none"
              />
            )}

            {tab === "faq" && (
              <div className="space-y-3 max-h-64 overflow-y-auto no-scrollbar pr-1">
                {faq.map((item, i) => (
                  <div key={i} className="bg-black/30 rounded-xl p-3">
                    <input
                      value={item.pregunta}
                      onChange={e => updateFaqItem(i, "pregunta", e.target.value)}
                      placeholder="Pregunta"
                      className="w-full bg-white/5 rounded-lg px-2 py-1.5 text-sm mb-2 outline-none"
                    />
                    <textarea
                      value={item.respuesta}
                      onChange={e => updateFaqItem(i, "respuesta", e.target.value)}
                      placeholder="Respuesta"
                      className="w-full bg-white/5 rounded-lg px-2 py-1.5 text-sm outline-none"
                    />
                    <button onClick={() => removeFaqItem(i)} className="text-xs text-red-400 mt-1">Eliminar</button>
                  </div>
                ))}
                <button onClick={addFaqItem} className="text-sm text-emerald-400">+ Agregar pregunta</button>
              </div>
            )}

            {error && <p className="text-red-400 text-sm mt-3">{error}</p>}

            <div className="flex flex-wrap gap-3 mt-5">
              <button onClick={save} className="flex-1 py-3 rounded-xl bg-emerald-500 text-slate-900 font-semibold min-w-[140px]">Guardar y aplicar</button>
              <button onClick={exportJSON} className="py-3 px-4 rounded-xl bg-white/10">Exportar JSON</button>
              <button onClick={() => fileInputRef.current.click()} className="py-3 px-4 rounded-xl bg-white/10">Importar JSON</button>
              <input ref={fileInputRef} type="file" accept="application/json" onChange={importJSON} className="hidden" />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================== APP ============================== */

const IDLE_TIMEOUT_MS = 60000;

function App() {
  const [screen, setScreen] = useState("bienvenida"); // bienvenida | chat
  const [avatarState, setAvatarState] = useState("reposo"); // reposo | escuchando | pensando | hablando
  const [viseme, setViseme] = useState("closed");
  const [isBlinking, setIsBlinking] = useState(false);
  const [subtitle, setSubtitle] = useState("¡Buenos días! Bienvenido a HappyPay. ¿En qué le puedo ayudar hoy?");
  const [messages, setMessages] = useState([]); // historial para la API
  const [listening, setListening] = useState(false);
  const [keypadRequest, setKeypadRequest] = useState(null); // "monto" | "plazo" | "ingreso" | null
  const [evalData, setEvalData] = useState(null);
  const [adminOpen, setAdminOpen] = useState(false);
  const [errorMsg, setErrorMsg] = useState("");

  const [config, setConfig] = useState({ pin: ADMIN_PIN_DEFAULT, policies: DEFAULT_POLICIES, convenios: DEFAULT_CONVENIOS, faq: DEFAULT_FAQ });
  const [apiKey, setApiKey] = useState("");
  const [voiceURI, setVoiceURI] = useState("");
  const [voices, setVoices] = useState([]);

  const recognitionRef = useRef(null);
  const visemeTimerRef = useRef(null);
  const idleTimerRef = useRef(null);
  const blinkTimerRef = useRef(null);

  const systemPrompt = useMemo(() => buildSystemPrompt(config.policies, config.convenios, config.faq), [config]);

  /* ---- Blink loop ---- */
  useEffect(() => {
    function scheduleBlink() {
      const delay = 4000 + Math.random() * 2000;
      blinkTimerRef.current = setTimeout(() => {
        setIsBlinking(true);
        setTimeout(() => setIsBlinking(false), 130);
        scheduleBlink();
      }, delay);
    }
    scheduleBlink();
    return () => clearTimeout(blinkTimerRef.current);
  }, []);

  /* ---- Voices ---- */
  useEffect(() => {
    function loadVoices() {
      const all = window.speechSynthesis.getVoices().filter(v => v.lang.toLowerCase().startsWith("es"));
      setVoices(all);
    }
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }, []);

  const pickVoice = useCallback(() => {
    if (voiceURI) {
      const v = voices.find(v => v.voiceURI === voiceURI);
      if (v) return v;
    }
    const preferred = voices.find(v => /es-us|es-mx|es-419/i.test(v.lang)) || voices[0];
    return preferred || null;
  }, [voices, voiceURI]);

  /* ---- Inactivity reset ---- */
  const resetIdleTimer = useCallback(() => {
    clearTimeout(idleTimerRef.current);
    idleTimerRef.current = setTimeout(() => {
      window.speechSynthesis.cancel();
      if (recognitionRef.current) recognitionRef.current.stop();
      setMessages([]);
      setEvalData(null);
      setKeypadRequest(null);
      setScreen("bienvenida");
      setAvatarState("reposo");
      setSubtitle("¡Buenos días! Bienvenido a HappyPay. ¿En qué le puedo ayudar hoy?");
    }, IDLE_TIMEOUT_MS);
  }, []);

  useEffect(() => {
    resetIdleTimer();
    return () => clearTimeout(idleTimerRef.current);
  }, [resetIdleTimer, screen, messages]);

  /* ---- Speak with viseme lip-sync ---- */
  const speak = useCallback((text) => {
    window.speechSynthesis.cancel();
    clearInterval(visemeTimerRef.current);
    if (!text) { setAvatarState("reposo"); setViseme("closed"); return; }

    const utter = new SpeechSynthesisUtterance(text);
    const v = pickVoice();
    if (v) utter.voice = v;
    utter.lang = v ? v.lang : "es-419";
    utter.rate = 1;

    utter.onstart = () => {
      setAvatarState("hablando");
      visemeTimerRef.current = setInterval(() => {
        setViseme(VISEMES[Math.floor(Math.random() * (VISEMES.length - 1)) + 1]); // evita "closed" mientras habla
      }, 130);
    };
    utter.onboundary = () => {
      setViseme(Math.random() > 0.5 ? "open" : "o");
    };
    const stop = () => {
      clearInterval(visemeTimerRef.current);
      setViseme("closed");
      setAvatarState("reposo");
    };
    utter.onend = stop;
    utter.onerror = stop;
    window.speechSynthesis.speak(utter);
  }, [pickVoice]);

  /* ---- Marker parsing ---- */
  function parseMarkers(text) {
    let keypad = null;
    let clean = text;
    if (/\[TECLADO:monto\]/i.test(text)) { keypad = "monto"; clean = clean.replace(/\[TECLADO:monto\]/gi, ""); }
    else if (/\[TECLADO:plazo\]/i.test(text)) { keypad = "plazo"; clean = clean.replace(/\[TECLADO:plazo\]/gi, ""); }
    else if (/\[TECLADO:ingreso\]/i.test(text)) { keypad = "ingreso"; clean = clean.replace(/\[TECLADO:ingreso\]/gi, ""); }
    return { clean: clean.trim(), keypad };
  }

  /* ---- Send a user turn to the brain ---- */
  const sendTurn = useCallback(async (userText) => {
    resetIdleTimer();
    setScreen("chat");
    setKeypadRequest(null);
    setSubtitle(userText);
    setAvatarState("pensando");
    setErrorMsg("");

    const newHistory = [...messages, { role: "user", content: userText }];
    setMessages(newHistory);

    try {
      const { replyText, finalMessages, lastEval } = await runBrainTurn(newHistory, systemPrompt, config.policies, apiKey);
      if (lastEval) setEvalData(lastEval);
      const { clean, keypad } = parseMarkers(replyText);
      setMessages(finalMessages);
      setSubtitle(clean);
      if (keypad) setKeypadRequest(keypad);
      speak(clean);
    } catch (err) {
      setAvatarState("reposo");
      const msg = "No pude conectarme en este momento. Por favor intente nuevamente o hable con un ejecutivo.";
      setSubtitle(msg);
      setErrorMsg(err.message || String(err));
      speak(msg);
    }
  }, [messages, systemPrompt, config.policies, apiKey, speak, resetIdleTimer]);

  /* ---- Speech recognition ---- */
  const toggleListening = useCallback(() => {
    resetIdleTimer();
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setSubtitle("Este navegador no soporta reconocimiento de voz. Use Google Chrome.");
      return;
    }
    if (listening) {
      recognitionRef.current && recognitionRef.current.stop();
      setListening(false);
      setAvatarState("reposo");
      return;
    }
    const rec = new SR();
    rec.lang = "es-EC";
    rec.continuous = true;
    rec.interimResults = true;
    rec.onstart = () => { setListening(true); setAvatarState("escuchando"); };
    rec.onresult = (e) => {
      resetIdleTimer();
      let finalText = "";
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += t;
        else interim += t;
      }
      if (finalText.trim()) {
        rec.stop();
        setListening(false);
        sendTurn(finalText.trim());
      } else if (interim) {
        setSubtitle(interim);
      }
    };
    rec.onerror = () => { setListening(false); setAvatarState("reposo"); };
    rec.onend = () => { setListening(false); setAvatarState(a => a === "escuchando" ? "reposo" : a); };
    recognitionRef.current = rec;
    rec.start();
  }, [listening, sendTurn, resetIdleTimer]);

  const handleKeypadConfirm = (value) => {
    const labels = { monto: "Monto deseado", plazo: "Plazo", ingreso: "Ingreso mensual" };
    setKeypadRequest(null);
    sendTurn(`${labels[keypadRequest]}: ${value}${keypadRequest !== "plazo" ? " USD" : " meses"}`);
  };

  const showEvalCard = evalData && evalData.result.cumple;

  return (
    <div className="h-full w-full flex flex-col items-center justify-between px-4 py-6 relative overflow-hidden">
      {/* Admin gear */}
      <button
        onClick={() => setAdminOpen(true)}
        className="absolute top-4 right-4 w-9 h-9 rounded-full bg-white/5 hover:bg-white/15 flex items-center justify-center text-lg opacity-60 hover:opacity-100"
        aria-label="Administración"
      >
        ⚙
      </button>

      <div className="flex flex-col items-center gap-1 mt-4">
        <span className="text-emerald-400 font-extrabold text-2xl tracking-tight">Kolega</span>
        <span className="text-slate-400 text-xs uppercase tracking-widest">HappyPay Ecuador</span>
      </div>

      <div className="flex-1 flex items-center justify-center w-full">
        <AvatarSVG state={avatarState} viseme={viseme} isBlinking={isBlinking} />
      </div>

      <div className="w-full max-w-lg text-center mb-4 min-h-[3.5rem] px-2">
        <p className="text-lg sm:text-xl font-medium leading-snug">{subtitle}</p>
      </div>

      {showEvalCard && <EvalCard evalData={evalData} />}

      {screen === "bienvenida" && <QuickActions onPick={sendTurn} disabled={listening} />}

      <button
        onClick={toggleListening}
        className={`relative mt-5 mb-2 w-full max-w-xs py-4 rounded-full font-semibold text-slate-900 transition active:scale-95 ${listening ? "bg-red-400 mic-pulse" : "bg-emerald-400 hover:bg-emerald-300"}`}
      >
        {listening ? "Escuchando… toque para detener" : "🎙 Toca para hablar"}
      </button>

      {keypadRequest === "monto" && (
        <NumericKeypad label="Monto deseado (USD)" onConfirm={handleKeypadConfirm} onCancel={() => setKeypadRequest(null)} />
      )}
      {keypadRequest === "ingreso" && (
        <NumericKeypad label="Ingreso mensual (USD)" onConfirm={handleKeypadConfirm} onCancel={() => setKeypadRequest(null)} />
      )}
      {keypadRequest === "plazo" && (
        <PlazoChips plazos={config.policies.plazos_meses} onConfirm={handleKeypadConfirm} onCancel={() => setKeypadRequest(null)} />
      )}

      {adminOpen && (
        <AdminPanel
          config={config}
          setConfig={setConfig}
          apiKey={apiKey}
          setApiKey={setApiKey}
          voiceURI={voiceURI}
          setVoiceURI={setVoiceURI}
          voices={voices}
          onClose={() => setAdminOpen(false)}
        />
      )}

      {errorMsg && (
        <div className="absolute bottom-1 left-1 text-[10px] text-red-400/70 max-w-[90%] truncate">{errorMsg}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
